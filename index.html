    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "LocalBusiness",
          "@id": "https://ashaboutique.co.in/#business",
          "name": "Asha Boutique",
          "description": "Exquisite handcrafted sarees, bridal lehengas, designer blouses and bespoke tailoring in Mumbai. Timeless Indian fashion crafted with love since 2009.",
          "url": "https://ashaboutique.co.in",
          "logo": "https://ashaboutique.co.in/logo.jpeg",
          "image": "https://ashaboutique.co.in/logo.jpeg",
          "founder": {
            "@type": "Person",
            "name": "Asha Sharma"
          },
          "foundingDate": "2009",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Mumbai",
            "addressRegion": "Maharashtra",
            "addressCountry": "IN"
          },
          "priceRange": "₹₹₹",
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Asha Boutique Collections",
            "itemListElement": [
              { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Handcrafted Sarees" } },
              { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Bridal Lehengas" } },
              { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Designer Blouses" } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Tailoring" } }
            ]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://ashaboutique.co.in/#website",
          "url": "https://ashaboutique.co.in",
          "name": "Asha Boutique",
          "description": "Handcrafted sarees, lehengas & bespoke tailoring",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://ashaboutique.co.in/shop?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

  <style>
    #preloader {
      position: fixed; inset: 0;
      background: hsl(30,18%,99%);
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: flex-end;
      padding: 48px 56px;
      z-index: 9999;
      transition: opacity 0.75s cubic-bezier(0.76,0,0.24,1), visibility 0.75s;
    }
    #preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .pl-brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      overflow: hidden;
      display: flex;
      align-items: baseline;
      gap: 0.3em;
    }
    .pl-asha {
      display: inline-block;
      color: hsl(310,68%,38%);
      animation: pl-up 0.85s cubic-bezier(0.16,1,0.3,1) 0.05s both;
    }
    .pl-boutique {
      display: inline-block;
      color: hsl(248,46%,40%);
      font-size: 0.55em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      animation: pl-up 0.85s cubic-bezier(0.16,1,0.3,1) 0.15s both;
    }

    .pl-sub {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: hsl(248,12%,62%);
      margin-top: 10px;
      animation: pl-fade 0.7s ease 0.45s both;
    }

    .pl-bar-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: hsl(30,14%,91%);
    }
    .pl-bar {
      height: 100%;
      width: 0%;
      animation: pl-fill 1.15s cubic-bezier(0.76,0,0.24,1) 0.1s forwards,
                 pl-color 1.15s ease 0.1s forwards;
    }

    @keyframes pl-up {
      from { transform: translateY(110%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes pl-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pl-fill {
      to { width: 100%; }
    }
    @keyframes pl-color {
      0%   { background: hsl(310,68%,38%); }
      60%  { background: hsl(290,56%,38%); }
      100% { background: hsl(248,46%,40%); }
    }
  </style>
  </head>

  <body>
    <div id="preloader">
      <div class="pl-brand">
        <span class="pl-asha">Asha</span>
        <span class="pl-boutique">Boutique</span>
      </div>
      <div class="pl-sub">Handcrafted Elegance</div>
      <div class="pl-bar-wrap"><div class="pl-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </body>
</html>
